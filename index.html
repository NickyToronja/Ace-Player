<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDJ | Stream Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0c; --card-bg: #1a1a20; --accent: #7f5af0;
            --f1: #e10600; --dazn: #3498db; --nba: #ff9800; --foot: #2ecc71;
        }
        body {
            font-family: 'Poppins', sans-serif; background: var(--bg-deep); color: white;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        header { margin-bottom: 40px; text-align: center; }
        .logo { height: 70px; border-radius: 12px; margin-bottom: 10px; border: 2px solid var(--accent); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        
        .card { 
            background: var(--card-bg); border-radius: 15px; padding: 20px; 
            border: 1px solid #333; text-align: left; transition: 0.3s;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        
        .title { font-size: 1.3rem; font-weight: 700; margin: 10px 0; }
        .tag { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; padding: 3px 8px; border-radius: 5px; }

        .btn-box { display: flex; gap: 10px; margin-top: 15px; }
        .btn { 
            flex: 1; padding: 12px; border-radius: 8px; border: none; 
            cursor: pointer; font-weight: 700; font-size: 0.8rem;
            transition: 0.2s; text-transform: uppercase;
        }
        .btn-play { background: var(--accent); color: white; }
        .btn-copy { background: #333; color: #ccc; }
        .btn:hover { opacity: 0.8; }

        /* Aviso de copiado */
        #toast { 
            visibility: hidden; position: fixed; bottom: 30px; left: 50%; 
            transform: translateX(-50%); background: white; color: black; 
            padding: 12px 25px; border-radius: 50px; font-weight: 800; z-index: 1000;
        }
        #toast.show { visibility: visible; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { bottom: 0; } to { bottom: 30px; } }
    </style>
</head>
<body>

<header>
    <img src="SDJ.jpg" alt="Logo SDJ" class="logo">
    <h1 style="font-family: 'Oswald'; margin: 0;">SDJ STREAM CENTER</h1>
</header>

<div class="grid">
    <div class="card">
        <span class="tag" style="background: var(--f1)">Motor</span>
        <div class="title">Fórmula 1 (DAZN)</div>
        <div class="btn-box">
            <button class="btn btn-play" onclick="launch('d65257bb934b73647374224fd62d836815804be2')">Reproducir</button>
            <button class="btn btn-copy" onclick="copy('d65257bb934b73647374224fd62d836815804be2', 'F1')">Copiar ID</button>
        </div>
    </div>

    <div class="card">
        <span class="tag" style="background: var(--dazn)">Multi</span>
        <div class="title">DAZN 1</div>
        <div class="btn-box">
            <button class="btn btn-play" onclick="launch('4141892f5df7d6474bf0279895ce02b7336c9928')">Reproducir</button>
            <button class="btn btn-copy" onclick="copy('4141892f5df7d6474bf0279895ce02b7336c9928', 'DAZN 1')">Copiar ID</button>
        </div>
    </div>

    <div class="card">
        <span class="tag" style="background: var(--nba)">Basket</span>
        <div class="title">NBA TV</div>
        <div class="btn-box">
            <button class="btn btn-play" onclick="launch('e72d03fb9694164317260f684470be9ab781ed95')">Reproducir</button>
            <button class="btn btn-copy" onclick="copy('e72d03fb9694164317260f684470be9ab781ed95', 'NBA')">Copiar ID</button>
        </div>
    </div>

    <div class="card">
        <span class="tag" style="background: var(--foot)">Fútbol</span>
        <div class="title">Fútbol Premium</div>
        <div class="btn-box">
            <button class="btn btn-play" onclick="launch('31c19ffb3472c289c5bbbbc174449c8ed0d19e38')">Reproducir</button>
            <button class="btn btn-copy" onclick="copy('31c19ffb3472c289c5bbbbc174449c8ed0d19e38', 'Fútbol')">Copiar ID</button>
        </div>
    </div>
</div>

<div id="toast">Copiado con éxito</div>

<script>
    function launch(id) {
        window.location.href = 'acestream://' + id;
    }

    function copy(id, name) {
        // Método de copiado infalible
        const el = document.createElement('textarea');
        el.value = id;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);

        const toast = document.getElementById('toast');
        toast.innerText = "📋 ID de " + name + " copiada";
        toast.className = "show";
        setTimeout(() => { toast.className = ""; }, 3000);
    }
</script>

</body>
</html>
