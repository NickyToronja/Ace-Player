<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDJ | Command Center v4.5 Platinum</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    
    <script>
        // Bloquea intentos de abrir ventanas emergentes automáticas
        window.open = function() { console.log("SDJ Shield: Popup bloqueado para seguridad."); return null; };
        // Intento de detener scripts de redirección comunes
        window.onbeforeunload = function() { /* Evita que scripts maliciosos te saquen de la web */ };
    </script>

    <style>
        :root {
            --bg-deep: #0a0a0c; --bg-stripe: #121216; --card-bg: #1a1a20;
            --accent-neon: #7f5af0; --discord-color: #5865F2; --f1-red: #e10600;
            --text-main: #ffffff; --fav-gold: #f1c40f; --transition: all 0.3s ease;
        }

        @keyframes stripe-move { 0% { background-position: 0 0; } 100% { background-position: 100px 100px; } }
        
        body {
            font-family: 'Poppins', sans-serif; background-color: var(--bg-deep); color: var(--text-main);
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: linear-gradient(135deg, var(--bg-stripe) 25%, transparent 25%, transparent 50%, var(--bg-stripe) 50%, var(--bg-stripe) 75%, transparent 75%, transparent);
            background-size: 80px 80px; animation: stripe-move 12s linear infinite;
        }

        header {
            width: 100%; background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(15px);
            padding: 20px 0; text-align: center; border-bottom: 2px solid var(--accent-neon);
            position: sticky; top: 0; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .container { width: 100%; max-width: 1200px; padding: 30px 20px; box-sizing: border-box; }
        h1 { font-family: 'Oswald'; font-size: 3rem; text-align: center; margin: 0 0 20px 0; letter-spacing: 2px; text-shadow: 0 0 15px var(--accent-neon); }

        /* WIDGET MARCA QUIRÚRGICO (MODO OSCURO) */
        .marca-container {
            position: relative; width: 100%; height: 500px; border-radius: 25px;
            overflow: hidden; border: 2px solid var(--accent-neon); background: #111;
            margin-bottom: 40px; box-shadow: 0 0 30px rgba(127, 90, 240, 0.3);
        }
        .marca-iframe {
            position: absolute; top: -320px; left: 0; width: 100%; height: 1600px; border: none;
            filter: invert(0.9) hue-rotate(160deg) brightness(1.1) contrast(1.2);
            /* Sandbox para evitar que el iframe ejecute popups o cambie la URL del padre */
        }
        .shield-label {
            position: absolute; top: 15px; right: 20px; background: var(--accent-neon);
            color: white; padding: 5px 12px; border-radius: 50px; font-size: 0.6rem; font-weight: 800;
            z-index: 10; letter-spacing: 1px; box-shadow: 0 0 10px var(--accent-neon);
        }

        /* CONTROLES */
        .controls-wrapper { display: flex; flex-direction: column; gap: 20px; align-items: center; margin-bottom: 50px; }
        .search-input {
            width: 100%; max-width: 600px; padding: 15px 25px; border-radius: 30px; border: 2px solid #333;
            background: var(--card-bg); color: white; font-size: 1rem; outline: none; transition: 0.3s;
        }
        .search-input:focus { border-color: var(--accent-neon); box-shadow: 0 0 15px rgba(127, 90, 240, 0.3); }

        .btn-group { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .btn-main {
            padding: 12px 25px; border-radius: 50px; text-decoration: none; font-weight: 800;
            text-transform: uppercase; font-size: 0.75rem; transition: var(--transition);
            display: flex; align-items: center; gap: 8px; color: white; border: none; cursor: pointer;
        }

        /* GRID Y TARJETAS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 24px; overflow: hidden; border: 1px solid #222; transition: var(--transition); position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent-neon); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .card-body { padding: 25px; }
        .card-tag { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; color: var(--accent-neon); }
        .card-title { font-size: 1.2rem; font-weight: 700; margin: 0 0 20px 0; letter-spacing: -0.5px; }

        .action-box { display: flex; gap: 10px; }
        .a-btn {
            flex: 1; padding: 12px; border-radius: 14px; border: none; cursor: pointer;
            font-weight: 800; font-size: 0.75rem; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 5px; color: white; text-decoration: none; transition: 0.2s;
        }
        .a-play { background: var(--accent-neon); }
        .a-play:hover { filter: brightness(1.2); }
        .a-copy { background: #333; }
        .a-copy:hover { background: #444; }

        #toast {
            visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: white; color: black; padding: 12px 35px; border-radius: 50px; font-weight: 800; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        #toast.show { visibility: visible; animation: slideIn 0.4s; }
        @keyframes slideIn { from { bottom: -50px; opacity: 0; } to { bottom: 30px; opacity: 1; } }
    </style>
</head>
<body>

    <div id="toast">ID Copiada al portapapeles</div>

    <script>
        function copyId(id) {
            navigator.clipboard.writeText(id).then(() => {
                const t = document.getElementById("toast");
                t.classList.add("show");
                setTimeout(() => t.classList.remove("show"), 3000);
            });
        }

        function filterChannels() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(input) ? "block" : "none";
            });
        }
    </script>
