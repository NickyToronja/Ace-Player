<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDJ | Stream Center Pro v7.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    
    <script>
        window.open = function() { return null; }; // Bloquea apertura de ventanas

    <style>
        :root {
            --bg-deep: #0a0a0c; --bg-stripe: #121216; --card-bg: #1a1a20;
            --accent-neon: #7f5af0; --discord-color: #5865F2; --f1-red: #e10600;
            --foot-green: #2ecc71; --text-main: #ffffff; --fav-gold: #f1c40f;
            --transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        @keyframes stripe-move { 0% { background-position: 0 0; } 100% { background-position: 100px 100px; } }
        
        body {
            font-family: 'Poppins', sans-serif; background-color: var(--bg-deep); color: var(--text-main);
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: linear-gradient(135deg, var(--bg-stripe) 25%, transparent 25%, transparent 50%, var(--bg-stripe) 50%, var(--bg-stripe) 75%, transparent 75%, transparent);
            background-size: 80px 80px; animation: stripe-move 12s linear infinite;
        }

        header {
            width: 100%; background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(10px);
            padding: 20px 0; text-align: center; border-bottom: 2px solid var(--accent-neon);
            position: sticky; top: 0; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo-sdj { height: 60px; border-radius: 12px; border: 1px solid var(--accent-neon); }
        .container { width: 100%; max-width: 1200px; padding: 30px 20px; box-sizing: border-box; }
        h1 { font-family: 'Oswald'; font-size: 3rem; text-align: center; margin: 0 0 20px 0; letter-spacing: 2px; }

        /* WIDGET DE PROGRAMACIÓN (SEGURO Y SIN ANUNCIOS) */
        .event-widget {
            background: #111; border: 2px solid var(--accent-neon); border-radius: 20px; 
            overflow: hidden; margin-bottom: 40px; height: 500px; position: relative;
            box-shadow: 0 0 20px rgba(127, 90, 240, 0.2);
        }
        .event-widget iframe {
            width: 100%; height: 100%; border: none;
            filter: invert(0.9) hue-rotate(180deg) brightness(1.1);
        }

        .controls-wrapper { display: flex; flex-direction: column; gap: 20px; align-items: center; margin-bottom: 50px; }
        .search-input {
            width: 100%; max-width: 600px; padding: 15px 25px; border-radius: 30px; border: 2px solid #333;
            background: var(--card-bg); color: white; font-size: 1rem; outline: none; transition: 0.3s;
        }
        .search-input:focus { border-color: var(--accent-neon); }

        .btn-group { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn-main {
            padding: 12px 22px; border-radius: 50px; text-decoration: none; font-weight: 800;
            text-transform: uppercase; font-size: 0.75rem; transition: var(--transition);
            display: flex; align-items: center; gap: 8px; color: white; border: none; cursor: pointer;
        }
        .btn-discord { background: var(--discord-color); }
        .btn-download { background: var(--f1-red); }

        .category-title {
            font-family: 'Oswald'; font-size: 1.6rem; text-transform: uppercase;
            display: flex; align-items: center; gap: 15px; margin-bottom: 25px;
            padding-left: 15px; border-left: 5px solid var(--accent-neon);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-bottom: 50px; }
        
        .card {
            background: var(--card-bg); border-radius: 24px; overflow: hidden;
            border: 1px solid #222; transition: var(--transition); position: relative;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent-neon); }
        .card-img { height: 100px; display: flex; align-items: center; justify-content: center; font-size: 3rem; border-bottom: 1px solid #222; }
        .card-body { padding: 20px; }
        .card-tag { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; opacity: 0.6; }
        .card-title { font-size: 1.1rem; font-weight: 700; margin: 0 0 15px 0; }

        .action-box { display: flex; gap: 8px; }
        .a-btn {
            flex: 1; padding: 10px; border-radius: 12px; border: none; cursor: pointer;
            font-weight: 800; font-size: 0.7rem; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 5px; color: white; text-decoration: none;
        }
        .a-play { background: var(--accent-neon); }
        .a-copy { background: #333; }

        #toast {
            visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: white; color: black; padding: 12px 30px; border-radius: 50px; font-weight: 800; z-index: 1000;
        }
        #toast.show { visibility: visible; }
    </style>
</head>

    <div id="toast">Copiado</div>

    <script>
        function copy(id) {
            navigator.clipboard.writeText(id).then(() => {
                const t = document.getElementById("toast");
                t.classList.add("show");
                setTimeout(() => t.classList.remove("show"), 3000);
            });
        }
        function filter() {
            let val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(val) ? "block" : "none";
            });
        }
    </script>
