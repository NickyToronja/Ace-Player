<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamPanel Pro 2026</title>
    <style>
        :root {
            --primary: #3498db;
            --bg: #0f0f0f;
            --card-bg: #1e1e1e;
            --text: #ffffff;
            --accent: #27ae60;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 80px;
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.8), transparent);
            padding: 20px;
            text-align: center;
        }

        .container { max-width: 1000px; margin: auto; padding: 15px; }

        h2 { border-left: 4px solid var(--primary); padding-left: 10px; margin-top: 30px; }

        /* GRILLA DE CANALES */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .channel-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid #333;
            text-decoration: none;
            color: white;
            display: block;
        }

        .channel-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .channel-card i { font-size: 2em; display: block; margin-bottom: 10px; }

        /* SECCIÓN NOTICIAS */
        .news-scroll {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding-bottom: 10px;
        }

        .news-card {
            min-width: 280px;
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .news-card img { width: 100%; height: 140px; object-fit: cover; }
        .news-content { padding: 12px; font-size: 0.9em; }

        /* BOTONES FLOTANTES */
        .admin-bar {
            position: fixed;
            bottom: 0; width: 100%;
            background: #1a1a1a;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #333;
            z-index: 1000;
        }

        .btn-admin {
            background: var(--primary);
            color: white; border: none;
            padding: 10px 20px; border-radius: 20px;
            cursor: pointer; font-weight: bold;
        }

        /* MODALES / AJUSTES */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #2c3e50; padding: 25px;
            border-radius: 20px; z-index: 2000;
            width: 90%; max-width: 400px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        input, textarea {
            width: 100%; margin-bottom: 15px;
            padding: 12px; border-radius: 8px; border: none;
            box-sizing: border-box;
        }

        .overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            z-index: 1500;
        }

        .badge { background: var(--accent); font-size: 0.7em; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <h1>STREAM<span style="color:var(--primary)">PANEL</span></h1>
    <p style="font-size: 0.8em; color: #888;">Bienvenido | Hoy es 13 de marzo de 2026</p>
</header>

<div class="container">
    
    <h2>📰 Noticias y Avisos</h2>
    <div id="news-container" class="news-scroll">
        </div>

    <h2>🏆 Canales Principales</h2>
    <div class="grid">
        <a href="acestream://90237c8651c65a7824b2684a8268482684826848" class="channel-card">📺 M+ Plus</a>
        <a href="acestream://3b5692a70c0d0d1dd23fed31d7886b4aaa64bdaa" class="channel-card">⚽ Champions</a>
        <a href="acestream://68c56e3089d8929949826a575a68739a82688846" class="channel-card">🎬 Estrenos</a>
        <a href="acestream://f1396b79788e0b63168b19de62070e7f23ad069c" class="channel-card">🐣 Boing</a>
        <a href="acestream://b3fc9b5647c5933b101c0b6b64322590c68587b9" class="channel-card">🌍 Nat Geo</a>
    </div>

    <h2>⭐ Mis Canales Guardados</h2>
    <div id="custom-channels" class="grid">
        </div>
</div>

<div class="admin-bar">
    <button class="btn-admin" onclick="openModal('modal-noticia')">+ Noticia</button>
    <button class="btn-admin" style="background:#8e44ad" onclick="openModal('modal-canal')">+ Canal</button>
</div>

<div id="modal-noticia" class="modal">
    <h3>Nueva Noticia</h3>
    <input type="text" id="n-titulo" placeholder="Título">
    <textarea id="n-texto" placeholder="Mensaje..."></textarea>
    <input type="text" id="n-img" placeholder="URL Foto (Imgur/Postimg)">
    <button class="btn-admin" style="width:100%" onclick="saveNews()">Publicar</button>
</div>

<div id="modal-canal" class="modal">
    <h3>Guardar Canal</h3>
    <input type="text" id="c-nombre" placeholder="Nombre (Ej: DAZN 1)">
    <input type="text" id="c-id" placeholder="ID de AceStream">
    <button class="btn-admin" style="width:100%; background:#8e44ad" onclick="saveChannel()">Guardar</button>
</div>

<div id="overlay" class="overlay" onclick="closeModals()"></div>

<script>
    // CARGA INICIAL
    window.onload = () => { renderNews(); renderChannels(); };

    function openModal(id) {
        document.getElementById(id).style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeModals() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        document.getElementById('overlay').style.display = 'none';
    }

    // GESTIÓN DE NOTICIAS
    function saveNews() {
        const tit = document.getElementById('n-titulo').value;
        const txt = document.getElementById('n-texto').value;
        const img = document.getElementById('n-img').value;
        
        if(!tit || !txt) return;

        let news = JSON.parse(localStorage.getItem('st_news')) || [];
        news.unshift({tit, txt, img: img || 'https://via.placeholder.com/300x150?text=News'});
        localStorage.setItem('st_news', JSON.stringify(news));
        
        closeModals(); renderNews();
    }

    function renderNews() {
        const box = document.getElementById('news-container');
        const news = JSON.parse(localStorage.getItem('st_news')) || [];
        box.innerHTML = news.map(n => `
            <div class="news-card">
                <img src="${n.img}">
                <div class="news-content">
                    <h3>${n.tit}</h3>
                    <p>${n.txt}</p>
                </div>
            </div>
        `).join('') || '<p>No hay noticias.</p>';
    }

    // GESTIÓN DE CANALES
    function saveChannel() {
        const name = document.getElementById('c-nombre').value;
        const id = document.getElementById('c-id').value;
        
        if(!name || !id) return;

        let chans = JSON.parse(localStorage.getItem('st_chans')) || [];
        chans.push({name, id});
        localStorage.setItem('st_chans', JSON.stringify(chans));
        
        closeModals(); renderChannels();
    }

    function renderChannels() {
        const box = document.getElementById('custom-channels');
        const chans = JSON.parse(localStorage.getItem('st_chans')) || [];
        box.innerHTML = chans.map((c, index) => `
            <div style="position:relative">
                <a href="acestream://${c.id}" class="channel-card">
                    <span class="badge">User</span><br>${c.name}
                </a>
                <button onclick="deleteChan(${index})" style="position:absolute; top:0; right:0; background:red; color:white; border:none; border-radius:50%; cursor:pointer">×</button>
            </div>
        `).join('') || '<p style="color:#666; padding:20px;">No has guardado canales todavía.</p>';
    }

    function deleteChan(index) {
        let chans = JSON.parse(localStorage.getItem('st_chans'));
        chans.splice(index, 1);
        localStorage.setItem('st_chans', JSON.stringify(chans));
        renderChannels();
    }
</script>

</body>
</html>
