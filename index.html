<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDJ | Stream Center Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0c; --bg-stripe: #121216; --card-bg: #1a1a20;
            --accent-neon: #7f5af0; --f1-red: #e10600; --dazn-blue: #3498db;
            --foot-green: #2ecc71; --movistar-blue: #00bcff; --champions-blue: #001e4e;
            --text-main: #ffffff; --live-red: #ff0000; --online-green: #2ecc71;
        }

        body {
            font-family: 'Poppins', sans-serif; background-color: var(--bg-deep); color: var(--text-main);
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: linear-gradient(135deg, var(--bg-stripe) 25%, transparent 25%, transparent 50%, var(--bg-stripe) 50%, var(--bg-stripe) 75%, transparent 75%, transparent);
            background-size: 80px 80px;
        }

        header { width: 100%; background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(10px); padding: 20px 0; text-align: center; border-bottom: 2px solid var(--accent-neon); position: sticky; top: 0; z-index: 100; }

        /* NOTICIAS */
        #news-section {
            width: 90%; max-width: 1100px; margin: 20px 0; display: none;
            background: rgba(127, 90, 240, 0.1); border: 2px solid var(--accent-neon);
            border-radius: 24px; overflow: hidden;
        }
        .news-img { width: 350px; height: 200px; object-fit: cover; border-right: 2px solid var(--accent-neon); }
        .news-content { padding: 25px; flex: 1; }
        .news-content h2 { margin: 0; color: var(--accent-neon); font-family: 'Oswald'; }

        .search-box { width: 90%; max-width: 500px; margin: 10px auto; padding: 12px 25px; border-radius: 50px; background: var(--card-bg); border: 2px solid #333; color: white; outline: none; display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; width: 100%; max-width: 1100px; padding: 20px; box-sizing: border-box; }

        .card { background: var(--card-bg); border-radius: 24px; overflow: hidden; border: 1px solid #222; position: relative; transition: 0.3s; }
        .card.live-now { border-color: var(--live-red); box-shadow: 0 0 15px rgba(255,0,0,0.3); }
        
        .card-img { height: 100px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; border-bottom: 1px solid #222; }
        .card-body { padding: 15px; }
        .a-btn { width: 100%; padding: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: 800; text-transform: uppercase; text-decoration: none; display: inline-block; text-align: center; margin-top: 5px; }
        .a-play { background: var(--accent-neon); color: white; }

        /* ADMIN PANEL */
        #settings-btn { position: fixed; bottom: 20px; right: 20px; background: #333; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; z-index: 1000; opacity: 0.6; }
        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a20; padding: 25px; border-radius: 20px; border: 2px solid var(--accent-neon); z-index: 2000; width: 350px; max-height: 80vh; overflow-y: auto; color: white; }
        input, textarea { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 8px; margin: 5px 0; border-radius: 5px; box-sizing: border-box; }
        
        .code-output { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 10px; height: 100px; overflow-y: auto; margin-top: 10px; display: none; }

        @media (max-width: 768px) { #news-section { flex-direction: column; } .news-img { width: 100%; height: 150px; border-right: none; border-bottom: 2px solid var(--accent-neon); } }
    </style>
</head>
<body>

    <header><img src="SDJ.jpg" alt="SDJ" style="height: 50px; border-radius: 10px;"></header>

    <div id="news-section">
        <img id="news-img-display" src="" class="news-img">
        <div class="news-content"><h2 id="news-title-display"></h2><p id="news-text-display"></p></div>
    </div>

    <input type="text" id="channelSearch" class="search-box" placeholder="Buscar canal..." onkeyup="filterChannels()">
    <div class="grid" id="main-grid"></div>

    <button id="settings-btn" onclick="openAdmin()">⚙️</button>

    <div id="admin-panel">
        <h3 style="color:var(--accent-neon)">Panel de Edición</h3>
        
        <label>Título Noticia:</label>
        <input type="text" id="adm-news-title">
        <label>Texto Noticia:</label>
        <textarea id="adm-news-text"></textarea>
        <label>URL Imagen:</label>
        <input type="text" id="adm-news-img">
        
        <hr style="border: 0.5px solid #333; margin: 15px 0;">
        <div id="adm-channels-list"></div>

        <button onclick="generateConfig()" class="a-play" style="width:100%; margin-top:15px; background: #2ecc71">1. GENERAR CÓDIGO</button>
        <div id="code-box" class="code-output"></div>
        <p id="help-msg" style="font-size: 9px; color: #888; display: none; margin-top: 5px;">Copia este código y reemplaza la sección de "DATOS MAESTROS" en tu archivo HTML para que el cambio sea global.</p>
        
        <button onclick="location.reload()" class="a-btn" style="background:#444; color:white">Cerrar y Ver Local</button>
    </div>

    <script>
        // ==========================================
        //  DATOS MAESTROS (ESTO ES LO QUE DEBES REEMPLAZAR)
        // ==========================================
        const MASTER_DATA = {
            news: {
                active: true,
                title: "BIENVENIDOS A SDJ",
                text: "Configura tus noticias desde el panel de ajustes.",
                img: "https://via.placeholder.com/350x200"
            },
            channels: [
                { id: 'f1', name: 'F1 DAZN', tag: 'Motor', icon: '🏎️', color: 'var(--f1-red)', ace: 'd65257bb934b73647374224fd62d836815804be2', live: true, off: false },
                { id: 'champions', name: 'Champions League', tag: 'UEFA', icon: '🏆', color: 'var(--champions-blue)', ace: 'e572a5178ff72eed7d1d751a18b4b3419699f370', live: false, off: false },
                { id: 'dazn-laliga', name: 'DAZN LaLiga', tag: 'LaLiga', icon: '⚽', color: 'var(--foot-green)', ace: '19f28f60c908f987b1a03da078e63320d7bf29e8', live: false, off: false },
                { id: 'm-laliga', name: 'M+ LaLiga TV', tag: 'M+ LaLiga', icon: '⚽', color: 'var(--movistar-blue)', ace: '31c19ffb3472c289c5bbbbc174449c8ed0d19e38', live: false, off: false }
            ]
        };

        // ==========================================
        //  LÓGICA DEL SISTEMA
        // ==========================================

        function renderWeb() {
            // Cargar Noticias
            const ns = document.getElementById('news-section');
            if(MASTER_DATA.news.active) {
                ns.style.display = 'flex';
                document.getElementById('news-img-display').src = MASTER_DATA.news.img;
                document.getElementById('news-title-display').innerText = MASTER_DATA.news.title;
                document.getElementById('news-text-display').innerText = MASTER_DATA.news.text;
            }

            // Cargar Canales
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            MASTER_DATA.channels.forEach(ch => {
                grid.innerHTML += `
                    <div class="card ${ch.live ? 'live-now' : ''}" id="card-${ch.id}">
                        <div class="card-img" style="background: radial-gradient(circle, ${ch.color} 0%, #000 100%);">${ch.icon}</div>
                        <div class="card-body">
                            <span style="font-size:0.7rem; color:${ch.live ? 'var(--live-red)' : ch.color}; font-weight:800">${ch.live ? '● EN VIVO' : ch.tag}</span>
                            <h3 style="margin:5px 0" class="card-title">${ch.name}</h3>
                            <a href="acestream://${ch.ace}" class="a-btn a-play">VER AHORA</a>
                        </div>
                    </div>`;
            });
        }

        function openAdmin() {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('adm-news-title').value = MASTER_DATA.news.title;
            document.getElementById('adm-news-text').value = MASTER_DATA.news.text;
            document.getElementById('adm-news-img').value = MASTER_DATA.news.img;

            const list = document.getElementById('adm-channels-list');
            list.innerHTML = '<h4>Canales Live:</h4>';
            MASTER_DATA.channels.forEach(ch => {
                list.innerHTML += `
                    <div style="font-size:11px; margin-bottom:5px">
                        ${ch.name} <input type="checkbox" id="chk-${ch.id}" ${ch.live ? 'checked' : ''}> LIVE
                    </div>`;
            });
        }

        function generateConfig() {
            // Actualizar objeto MASTER_DATA con lo que hay en los inputs
            MASTER_DATA.news.title = document.getElementById('adm-news-title').value;
            MASTER_DATA.news.text = document.getElementById('adm-news-text').value;
            MASTER_DATA.news.img = document.getElementById('adm-news-img').value;
            
            MASTER_DATA.channels.forEach(ch => {
                ch.live = document.getElementById(`chk-${ch.id}`).checked;
            });

            // Generar el string de código
            const code = "const MASTER_DATA = " + JSON.stringify(MASTER_DATA, null, 4) + ";";
            const box = document.getElementById('code-box');
            box.innerText = code;
            box.style.display = 'block';
            document.getElementById('help-msg').style.display = 'block';
            
            // Copiar automáticamente
            navigator.clipboard.writeText(code);
            alert("¡Código generado y copiado! Ahora pégalo en tu archivo HTML para actualizar la web de todos.");
        }

        function filterChannels() {
            let val = document.getElementById('channelSearch').value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(val) ? "block" : "none";
            });
        }

        renderWeb();
    </script>
</body>
</html>
