<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDJ | Stream Center Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0c; --bg-stripe: #121216; --card-bg: #1a1a20;
            --accent-neon: #7f5af0; --discord-color: #5865F2; --f1-red: #e10600;
            --text-main: #ffffff; --transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            --live-red: #ff0000;
        }

        @keyframes stripe-move { 0% { background-position: 0 0; } 100% { background-position: 100px 100px; } }
        
        /* Animación del Beam Rojo */
        @keyframes live-glow {
            0% { box-shadow: 0 0 10px var(--live-red); border-bottom-color: var(--live-red); }
            50% { box-shadow: 0 0 30px var(--live-red); border-bottom-color: #ff4d4d; }
            100% { box-shadow: 0 0 10px var(--live-red); border-bottom-color: var(--live-red); }
        }

        @keyframes pulse-live { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        body {
            font-family: 'Poppins', sans-serif; background-color: var(--bg-deep); color: var(--text-main);
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: linear-gradient(135deg, var(--bg-stripe) 25%, transparent 25%, transparent 50%, var(--bg-stripe) 50%, var(--bg-stripe) 75%, transparent 75%, transparent);
            background-size: 80px 80px; animation: stripe-move 12s linear infinite;
        }

        header {
            width: 100%; background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(10px);
            padding: 20px 0; text-align: center; border-bottom: 3px solid var(--accent-neon);
            position: sticky; top: 0; z-index: 100; transition: var(--transition);
        }

        /* Clase que activa el BEAM */
        header.event-live { animation: live-glow 1.5s infinite ease-in-out; }

        .live-indicator {
            display: none; color: var(--live-red); font-weight: 800; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; animation: pulse-live 1s infinite;
        }
        header.event-live .live-indicator { display: block; }

        .logo-sdj { height: 65px; border-radius: 12px; border: 1px solid var(--accent-neon); box-shadow: 0 0 20px rgba(127, 90, 240, 0.4); }

        .hero { width: 100%; max-width: 1100px; padding: 40px 20px; text-align: center; box-sizing: border-box; }
        h1 { font-family: 'Oswald'; font-size: 3.5rem; margin: 0; letter-spacing: 2px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; width: 100%; }

        /* TARJETAS */
        .card {
            background: var(--card-bg); border-radius: 24px; overflow: hidden;
            border: 1px solid #222; transition: var(--transition); display: flex; flex-direction: column;
        }

        /* Si la tarjeta tiene esta clase, brilla en rojo */
        .card.live-now { border: 1px solid var(--live-red); box-shadow: 0 0 20px rgba(255, 0, 0, 0.2); }
        .card.live-now .card-tag { color: var(--live-red) !important; animation: pulse-live 1s infinite; }

        .card:hover { border-color: var(--accent-neon); transform: translateY(-10px); }
        .card.live-now:hover { border-color: var(--live-red); box-shadow: 0 0 30px rgba(255, 0, 0, 0.4); }

        .card-img { height: 130px; background: #111; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; }
        .card-body { padding: 25px; }
        .card-tag { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; color: #888; }
        .card-title { font-size: 1.3rem; font-weight: 700; margin: 0 0 20px 0; }

        .action-box { display: flex; gap: 10px; }
        .a-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; transition: 0.2s; text-decoration: none; text-align: center; }
        .a-play { background: var(--accent-neon); color: white; }
        .a-copy { background: #222; color: #eee; border: 1px solid #333; }

        #toast { visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 15px 35px; border-radius: 50px; font-weight: 800; z-index: 1000; }
        #toast.show { visibility: visible; animation: slideIn 0.4s forwards; }
        @keyframes slideIn { from { bottom: -50px; } to { bottom: 30px; } }
    </style>
</head>
<body>

    <header id="main-header">
        <img src="SDJ.jpg" alt="SDJ" class="logo-sdj">
        <div class="live-indicator">● EN VIVO AHORA</div>
    </header>

    <div class="hero">
        <h1>SDJ COMMAND CENTER</h1>
        
        <div style="margin-bottom: 40px;">
            <a href="https://discord.com/invite/zCS9ZBUXAt" target="_blank" style="color: var(--discord-color); text-decoration: none; font-weight: 800;">DISCORD OFICIAL 💬</a>
        </div>

        <div class="grid">
            <div class="card live-now">
                <div class="card-img">🏆</div>
                <div class="card-body">
                    <span class="card-tag">LIVE - CHAMPIONS</span>
                    <h3 class="card-title">UEFA Champions League</h3>
                    <div class="action-box">
                        <a href="acestream://e572a5178ff72eed7d1d751a18b4b3419699f370" class="a-btn a-play">Abrir</a>
                        <button class="a-btn a-copy" onclick="copyId('e572a5178ff72eed7d1d751a18b4b3419699f370', 'Champions')">ID</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-img">🏎️</div>
                <div class="card-body">
                    <span class="card-tag">REPETICIÓN</span>
                    <h3 class="card-title">F1 - GP Australia</h3>
                    <div class="action-box">
                        <a href="acestream://d65257bb934b73647374224fd62d836815804be2" class="a-btn a-play">Abrir</a>
                        <button class="a-btn a-copy" onclick="copyId('d65257bb934b73647374224fd62d836815804be2', 'F1')">ID</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-img">⚽</div>
                <div class="card-body">
                    <span class="card-tag">Próximamente</span>
                    <h3 class="card-title">DAZN LaLiga</h3>
                    <div class="action-box">
                        <a href="acestream://19f28f60c908f987b1a03da078e63320d7bf29e8" class="a-btn a-play">Abrir</a>
                        <button class="a-btn a-copy" onclick="copyId('19f28f60c908f987b1a03da078e63320d7bf29e8', 'LaLiga')">ID</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast">Copiado</div>

    <script>
        // Esta función revisa si hay directos y enciende el Beam
        function updateLiveStatus() {
            const header = document.getElementById('main-header');
            const liveCards = document.querySelectorAll('.card.live-now');
            
            if (liveCards.length > 0) {
                header.classList.add('event-live');
            } else {
                header.classList.remove('event-live');
            }
        }

        // Ejecutar al cargar la página
        window.onload = updateLiveStatus;

        function copyId(id, name) {
            navigator.clipboard.writeText(id);
            const t = document.getElementById("toast");
            t.innerText = "📋 ID " + name + " copiada";
            t.className = "show";
            setTimeout(() => { t.className = ""; }, 3000);
        }
    </script>
</body>
</html>
