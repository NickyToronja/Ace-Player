<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDJ | Stream Center Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0c; --bg-stripe: #121216; --card-bg: #1a1a20;
            --accent-neon: #7f5af0; --discord-color: #5865F2; --f1-red: #e10600;
            --dazn-blue: #3498db; --nba-orange: #ff9800; --foot-green: #2ecc71;
            --movistar-blue: #00bcff; --champions-blue: #001e4e;
            --text-main: #ffffff; --transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            --live-red: #ff0000; --online-green: #2ecc71;
        }

        @keyframes stripe-move { 0% { background-position: 0 0; } 100% { background-position: 100px 100px; } }
        body {
            font-family: 'Poppins', sans-serif; background-color: var(--bg-deep); color: var(--text-main);
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: linear-gradient(135deg, var(--bg-stripe) 25%, transparent 25%, transparent 50%, var(--bg-stripe) 50%, var(--bg-stripe) 75%, transparent 75%, transparent);
            background-size: 80px 80px; animation: stripe-move 12s linear infinite;
        }

        header { 
            width: 100%; background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(10px); 
            padding: 15px 0; border-bottom: 2px solid var(--accent-neon); position: sticky; top: 0; z-index: 100;
        }

        .header-container {
            width: 90%; max-width: 1100px; margin: 0 auto; display: flex; 
            justify-content: space-between; align-items: center;
        }

        .header-links { display: flex; gap: 10px; }
        .nav-btn { 
            padding: 8px 15px; border-radius: 8px; text-decoration: none; color: white; 
            font-weight: 800; font-size: 0.75rem; display: flex; align-items: center; gap: 8px;
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-discord { background: var(--discord-color); }
        .btn-download { background: #333; }
        .nav-btn:hover { transform: translateY(-2px); filter: brightness(1.2); }

        #news-section {
            width: 90%; max-width: 1100px; margin: 20px 0; display: none;
            background: rgba(127, 90, 240, 0.08); border: 2px solid var(--accent-neon);
            border-radius: 24px; overflow: hidden; animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .news-img { width: 350px; height: 200px; object-fit: cover; border-right: 2px solid var(--accent-neon); }
        .news-content { padding: 25px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .news-content h2 { margin: 0 0 10px 0; color: var(--accent-neon); font-family: 'Oswald'; text-transform: uppercase; letter-spacing: 1px; }
        .news-content p { margin: 0; line-height: 1.6; color: #ccc; }

        .search-box { width: 90%; max-width: 500px; margin: 10px auto; padding: 12px 25px; border-radius: 50px; background: var(--card-bg); border: 2px solid #333; color: white; outline: none; display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; width: 100%; max-width: 1100px; padding: 20px; box-sizing: border-box; }

        .card { background: var(--card-bg); border-radius: 24px; overflow: hidden; border: 1px solid #222; transition: var(--transition); display: flex; flex-direction: column; position: relative; }
        .card.live-now { border-color: var(--live-red); box-shadow: 0 0 15px rgba(255,0,0,0.3); }
        .status-dot { position: absolute; top: 15px; right: 15px; width: 12px; height: 12px; border-radius: 50%; background: var(--online-green); border: 2px solid #000; }
        .status-dot.offline { background: #555 !important; }
        .fav-btn { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); border: none; color: #444; font-size: 1.2rem; cursor: pointer; width: 35px; height: 35px; border-radius: 50%; z-index: 5; }
        .fav-btn.active { color: #ffcc00; }

        .card-img { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 3rem; border-bottom: 1px solid #222; }
        .card-body { padding: 20px; }
        .card-title { font-size: 1.1rem; margin: 0 0 15px 0; }
        .action-box { display: flex; gap: 8px; }
        .a-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .a-play { background: var(--accent-neon); color: white; }

        /* ADMIN */
        #settings-btn { position: fixed; bottom: 20px; right: 20px; background: #333; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; z-index: 1000; opacity: 0.5; }
        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a20; padding: 25px; border-radius: 20px; border: 2px solid var(--accent-neon); z-index: 2000; width: 350px; max-height: 80vh; overflow-y: auto; box-shadow: 0 0 50px #000; }
        .admin-tab { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 8px; cursor: pointer; background: #333; color: white; border: none; border-radius: 5px; font-weight: 600; }
        .tab-btn.active { background: var(--accent-neon); }
        input, textarea { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 10px; margin: 5px 0; border-radius: 8px; box-sizing: border-box; }
        
        #code-output-box { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 10px; border-radius: 8px; margin-top: 10px; display: none; white-space: pre-wrap; word-break: break-all; max-height: 150px; overflow-y: auto; }
        #toast { visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 12px 30px; border-radius: 50px; font-weight: 800; z-index: 3000; }
        #toast.show { visibility: visible; }

        @media (max-width: 768px) {
            .header-container { flex-direction: column; gap: 15px; }
            #news-section { flex-direction: column; }
            .news-img { width: 100%; height: 150px; border-right: none; border-bottom: 2px solid var(--accent-neon); }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <img src="SDJ.jpg" alt="SDJ" style="height: 50px; border-radius: 8px;">
            <div class="header-links">
                <a href="URL_DE_TU_DISCORD" target="_blank" class="nav-btn btn-discord"><span>👾</span> DISCORD</a>
                <a href="URL_DE_TU_PROGRAMA" download class="nav-btn btn-download"><span>📥</span> DESCARGAR ACE</a>
            </div>
        </div>
    </header>

    <div id="news-section">
        <img id="news-img-display" src="" class="news-img">
        <div class="news-content">
            <h2 id="news-title-display"></h2>
            <p id="news-text-display"></p>
        </div>
    </div>

    <input type="text" id="channelSearch" class="search-box" placeholder="Buscar canal..." onkeyup="filterChannels()">

    <div class="grid" id="main-grid"></div>

    <button id="settings-btn" onclick="loginAdmin()">⚙️</button>

    <div id="admin-panel">
        <div class="admin-tab">
            <button class="tab-btn active" onclick="showTab('channels')">Canales</button>
            <button class="tab-btn" onclick="showTab('news')">Noticias</button>
        </div>

        <div id="tab-channels">
            <div id="admin-list"></div>
        </div>

        <div id="tab-news" style="display:none">
            <label>URL Imagen:</label>
            <input type="text" id="news-img-url">
            <label>Título:</label>
            <input type="text" id="news-title-input">
            <label>Mensaje:</label>
            <textarea id="news-text-input" rows="3"></textarea>
            <label>Mostrar noticia:</label>
            <select id="news-active-input" style="width:100%; padding:10px; background:#000; color:white; border-radius:8px;">
                <option value="true">SÍ</option>
                <option value="false">NO</option>
            </select>
        </div>

        <button onclick="generateMasterCode()" class="a-play" style="width:100%; margin-top:20px; padding:12px; border-radius:10px; background:#2ecc71">GENERAR CÓDIGO MAESTRO</button>
        <div id="code-output-box"></div>
        <button class="a-play" style="width:100%; margin-top:10px; padding:12px; border-radius:10px; background:#444" onclick="closeAdmin()">Cerrar</button>
    </div>

    <div id="toast">Copiado</div>

    <script>
        // ==========================================
        //  DATOS MAESTROS (REEMPLAZA ESTA SECCIÓN PARA ACTUALIZAR GLOBALMENTE)
        // ==========================================
        const MASTER_CONFIG = {
            news: {
                active: true,
                title: "BIENVENIDOS A SDJ",
                text: "Configura aquí tus noticias importantes. Únete a nuestro Discord para soporte.",
                img: "https://via.placeholder.com/350x200"
            },
            channels: [
                { id: 'f1', name: 'F1 DAZN', tag: 'Motor', icon: '🏎️', color: 'var(--f1-red)', ace: 'd65257bb934b73647374224fd62d836815804be2', live: true, off: false },
                { id: 'champions', name: 'Champions League', tag: 'UEFA', icon: '🏆', color: 'var(--champions-blue)', ace: 'e572a5178ff72eed7d1d751a18b4b3419699f370', live: false, off: false },
                { id: 'dazn-laliga', name: 'DAZN LaLiga', tag: 'LaLiga', icon: '⚽', color: 'var(--foot-green)', ace: '19f28f60c908f987b1a03da078e63320d7bf29e8', live: false, off: false },
                { id: 'movistar-laliga-1', name: 'M+ LaLiga TV', tag: 'M+ LaLiga', icon: '⚽', color: 'var(--movistar-blue)', ace: '31c19ffb3472c289c5bbbbc174449c8ed0d19e38', live: false, off: false },
                { id: 'movistar-laliga-2', name: 'M+ LaLiga 2', tag: 'M+ LaLiga', icon: '⚽', color: 'var(--movistar-blue)', ace: 'caa631e8850e3eb5e7c039063dd8a339ccef1176', live: false, off: false },
                { id: 'dazn-1', name: 'DAZN 1', tag: 'DAZN', icon: '📺', color: 'var(--dazn-blue)', ace: '4141892f5df7d6474bf0279895ce02b7336c9928', live: false, off: false },
                { id: 'dazn-2', name: 'DAZN 2', tag: 'DAZN', icon: '📺', color: 'var(--dazn-blue)', ace: 'b0eabe0fdd02fdd165896236765a9b753a2ff516', live: false, off: false },
                { id: 'nba', name: 'NBA TV Pro', tag: 'NBA', icon: '🏀', color: 'var(--nba-orange)', ace: 'e72d03fb9694164317260f684470be9ab781ed95', live: false, off: false }
            ]
        };

        const userAdmin = "admin";
        const passAdmin = "1234";

        function renderWeb() {
            const newsBox = document.getElementById('news-section');
            if(MASTER_CONFIG.news.active) {
                newsBox.style.display = 'flex';
                document.getElementById('news-img-display').src = MASTER_CONFIG.news.img;
                document.getElementById('news-title-display').innerText = MASTER_CONFIG.news.title;
                document.getElementById('news-text-display').innerText = MASTER_CONFIG.news.text;
            } else { newsBox.style.display = 'none'; }

            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            MASTER_CONFIG.channels.forEach(ch => {
                const isFav = localStorage.getItem(`fav_${ch.id}`) === 'true';
                grid.innerHTML += `
                    <div class="card ${ch.live ? 'live-now' : ''}" data-channel="${ch.id}">
                        <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFav('${ch.id}')">★</button>
                        <div class="status-dot ${ch.off ? 'offline' : ''}"></div>
                        <div class="card-img" style="background: radial-gradient(circle, ${ch.color} 0%, #000 100%);">${ch.icon}</div>
                        <div class="card-body">
                            <span class="card-tag" style="color: ${ch.live ? 'var(--live-red)' : ch.color}">${ch.live ? '● EN VIVO' : ch.tag}</span>
                            <h3 class="card-title">${ch.name}</h3>
                            <div class="action-box">
                                <a href="acestream://${ch.ace}" class="a-btn a-play">Abrir</a>
                                <button class="a-btn a-copy" onclick="copyId('${ch.ace}')" style="background:#222; color:white; flex:0.4">ID</button>
                            </div>
                        </div>
                    </div>`;
            });
            sortCards();
        }

        function generateMasterCode() {
            MASTER_CONFIG.news.title = document.getElementById('news-title-input').value;
            MASTER_CONFIG.news.text = document.getElementById('news-text-input').value;
            MASTER_CONFIG.news.img = document.getElementById('news-img-url').value;
            MASTER_CONFIG.news.active = document.getElementById('news-active-input').value === "true";

            MASTER_CONFIG.channels.forEach(ch => {
                ch.live = document.getElementById(`live-chk-${ch.id}`).checked;
                ch.off = document.getElementById(`off-chk-${ch.id}`).checked;
            });

            const code = "const MASTER_CONFIG = " + JSON.stringify(MASTER_CONFIG, null, 4) + ";";
            const output = document.getElementById('code-output-box');
            output.innerText = code;
            output.style.display = 'block';
            navigator.clipboard.writeText(code);
            alert("¡CÓDIGO GENERADO Y COPIADO! Pégalo en tu archivo HTML.");
        }

        function loginAdmin() {
            if(prompt("Admin:") === userAdmin && prompt("Pass:") === passAdmin) {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('news-title-input').value = MASTER_CONFIG.news.title;
                document.getElementById('news-text-input').value = MASTER_CONFIG.news.text;
                document.getElementById('news-img-url').value = MASTER_CONFIG.news.img;
                document.getElementById('news-active-input').value = MASTER_CONFIG.news.active.toString();

                const list = document.getElementById('admin-list');
                list.innerHTML = '';
                MASTER_CONFIG.channels.forEach(ch => {
                    list.innerHTML += `
                        <div style="padding:10px 0; border-bottom:1px solid #333; font-size:12px; color:white">
                            <strong>${ch.name}</strong><br>
                            Live: <input type="checkbox" id="live-chk-${ch.id}" ${ch.live ? 'checked' : ''}> | 
                            Caído: <input type="checkbox" id="off-chk-${ch.id}" ${ch.off ? 'checked' : ''}>
                        </div>`;
                });
            }
        }

        function showTab(tab) {
            document.getElementById('tab-channels').style.display = tab === 'channels' ? 'block' : 'none';
            document.getElementById('tab-news').style.display = tab === 'news' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function toggleFav(id) {
            const isFav = localStorage.getItem(`fav_${id}`) === 'true';
            localStorage.setItem(`fav_${id}`, !isFav);
            renderWeb();
        }

        function sortCards() {
            const grid = document.getElementById('main-grid');
            const cards = Array.from(grid.children);
            cards.sort((a, b) => (b.querySelector('.fav-btn').classList.contains('active')) - (a.querySelector('.fav-btn').classList.contains('active')));
            cards.forEach(c => grid.appendChild(c));
        }

        function filterChannels() {
            let input = document.getElementById('channelSearch').value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(input) ? "flex" : "none";
            });
        }

        function copyId(id) {
            navigator.clipboard.writeText(id);
            const t = document.getElementById("toast");
            t.className = "show"; setTimeout(() => t.className = "", 2000);
        }

        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        
        renderWeb();
    </script>
</body>
</html>
