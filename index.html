<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDJ | Stream Center Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0c; --bg-stripe: #121216; --card-bg: #1a1a20;
            --accent-neon: #7f5af0; --discord-color: #5865F2; --f1-red: #e10600;
            --dazn-blue: #3498db; --nba-orange: #ff9800; --foot-green: #2ecc71;
            --text-main: #ffffff; --transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            --live-red: #ff0000; --fav-gold: #f1c40f;
        }

        @keyframes stripe-move { 0% { background-position: 0 0; } 100% { background-position: 100px 100px; } }
        
        body {
            font-family: 'Poppins', sans-serif; background-color: var(--bg-deep); color: var(--text-main);
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: linear-gradient(135deg, var(--bg-stripe) 25%, transparent 25%, transparent 50%, var(--bg-stripe) 50%, var(--bg-stripe) 75%, transparent 75%, transparent);
            background-size: 80px 80px; animation: stripe-move 12s linear infinite;
        }

        header {
            width: 100%; background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(10px);
            padding: 20px 0; text-align: center; border-bottom: 2px solid var(--accent-neon);
            position: sticky; top: 0; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo-sdj { height: 60px; border-radius: 12px; border: 1px solid var(--accent-neon); }
        .container { width: 100%; max-width: 1200px; padding: 30px 20px; box-sizing: border-box; }
        h1 { font-family: 'Oswald'; font-size: 3rem; text-align: center; margin: 0 0 20px 0; letter-spacing: 2px; }

        .controls-wrapper { display: flex; flex-direction: column; gap: 20px; align-items: center; margin-bottom: 50px; }
        .search-input {
            width: 100%; max-width: 600px; padding: 15px 25px; border-radius: 30px; border: 2px solid #333;
            background: var(--card-bg); color: white; font-size: 1rem; outline: none; transition: 0.3s;
        }
        .search-input:focus { border-color: var(--accent-neon); box-shadow: 0 0 15px rgba(127, 90, 240, 0.3); }

        .btn-group { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn-main {
            padding: 12px 22px; border-radius: 50px; text-decoration: none; font-weight: 800;
            text-transform: uppercase; font-size: 0.75rem; transition: var(--transition);
            display: flex; align-items: center; gap: 8px; color: white; border: none; cursor: pointer;
        }
        .btn-discord { background: var(--discord-color); }
        .btn-download { background: var(--f1-red); }
        .btn-updates { background: #444; }
        .btn-reviews { background: var(--fav-gold); color: #000; }

        /* Categorías */
        .category-section { margin-bottom: 50px; }
        .category-title {
            font-family: 'Oswald'; font-size: 1.6rem; text-transform: uppercase;
            display: flex; align-items: center; gap: 15px; margin-bottom: 25px;
            padding-left: 15px; border-left: 5px solid var(--accent-neon);
        }
        .cat-motor { border-color: var(--f1-red); color: var(--f1-red); }
        .cat-futbol { border-color: var(--foot-green); color: var(--foot-green); }
        .cat-usa { border-color: var(--nba-orange); color: var(--nba-orange); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .card {
            background: var(--card-bg); border-radius: 24px; overflow: hidden;
            border: 1px solid #222; transition: var(--transition); position: relative;
        }
        .card-img { height: 100px; display: flex; align-items: center; justify-content: center; font-size: 3rem; border-bottom: 1px solid #222; }
        .card-body { padding: 20px; }
        .card-title { font-size: 1.1rem; font-weight: 700; margin: 0 0 15px 0; }

        .action-box { display: flex; gap: 8px; }
        .a-btn {
            flex: 1; padding: 10px; border-radius: 12px; border: none; cursor: pointer;
            font-weight: 800; font-size: 0.7rem; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 5px; color: white; text-decoration: none;
        }
        .a-play { background: var(--accent-neon); }
        .a-copy { background: #333; }

        /* Modales */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 200;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #1a1a20; width: 90%; max-width: 600px; border-radius: 25px;
            border: 2px solid var(--accent-neon); padding: 30px; max-height: 85vh; overflow-y: auto;
        }

        /* Sistema de Reseñas */
        .review-form { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; background: #25252e; padding: 20px; border-radius: 15px; }
        .review-input, .review-textarea {
            background: #1a1a20; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; font-family: inherit;
        }
        .review-textarea { height: 80px; resize: none; }
        .review-list { display: flex; flex-direction: column; gap: 15px; }
        .review-card { background: #25252e; padding: 15px; border-radius: 15px; border-left: 4px solid var(--fav-gold); }
        .review-header { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 8px; color: var(--fav-gold); font-weight: 800; }
        .review-text { font-size: 0.9rem; line-height: 1.4; color: #ccc; }

        #toast {
            visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: white; color: black; padding: 12px 30px; border-radius: 50px; font-weight: 800; z-index: 1000;
        }
        #toast.show { visibility: visible; animation: slideIn 0.4s; }

        @keyframes slideIn { from { bottom: -50px; opacity: 0; } to { bottom: 30px; opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <img src="SDJ.jpg" alt="SDJ" class="logo-sdj">
    </header>

    <div class="container">
        <h1>SDJ COMMAND CENTER</h1>
        
        <div class="controls-wrapper">
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar canal..." onkeyup="filterChannels()">
            
            <div class="btn-group">
                <a href="https://discord.gg/9xSdJfUQuw" target="_blank" class="btn-main btn-discord">💥 Discord</a>
                <a href="https://www.mediafire.com/file/s0kkul8d9cbpkty/Ace_Stream_Media_3.2.8.exe/file" target="_blank" class="btn-main btn-download">⛓️‍💥 Ace Player</a>
                <button onclick="toggleModal('modalUpdates')" class="btn-main btn-updates">🆕 Cambios</button>
                <button onclick="toggleModal('modalReviews')" class="btn-main btn-reviews">⭐ Reseñas</button>
            </div>
        </div>

        <div class="category-section">
            <div class="category-title cat-motor">🏎️ Motor</div>
            <div class="grid">
                <div class="card">
                    <div class="card-img" style="background: linear-gradient(45deg, #e10600, #000);">🏎️</div>
                    <div class="card-body">
                        <h3 class="card-title">Fórmula 1 (DAZN)</h3>
                        <div class="action-box">
                            <a href="acestream://d65257bb934b73647374224fd62d836815804be2" class="a-btn a-play">Abrir</a>
                            <button class="a-btn a-copy" onclick="copyId('d65257bb934b73647374224fd62d836815804be2', 'F1')">ID</button>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-img" style="background: linear-gradient(45deg, #333, #000);">🏍️</div>
                    <div class="card-body">
                        <h3 class="card-title">MotoGP (DAZN)</h3>
                        <div class="action-box">
                            <a href="acestream://11cbb5346d28af0b972e646832f4be23dd39502d" class="a-btn a-play">Abrir</a>
                            <button class="a-btn a-copy" onclick="copyId('11cbb5346d28af0b972e646832f4be23dd39502d', 'MotoGP')">ID</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="category-section">
            <div class="category-title cat-futbol">⚽ Fútbol</div>
            <div class="grid">
                <div class="card">
                    <div class="card-img" style="background: linear-gradient(45deg, #2ecc71, #000);">⚽</div>
                    <div class="card-body">
                        <h3 class="card-title">DAZN LaLiga</h3>
                        <div class="action-box">
                            <a href="acestream://19f28f60c908f987b1a03da078e63320d7bf29e8" class="a-btn a-play">Abrir</a>
                            <button class="a-btn a-copy" onclick="copyId('19f28f60c908f987b1a03da078e63320d7bf29e8', 'DAZN LaLiga')">ID</button>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-img" style="background: linear-gradient(45deg, #001e4e, #000);">🏆</div>
                    <div class="card-body">
                        <h3 class="card-title">Liga de Campeones</h3>
                        <div class="action-box">
                            <a href="acestream://e572a5178ff72eed7d1d751a18b4b3419699f370" class="a-btn a-play">Abrir</a>
                            <button class="a-btn a-copy" onclick="copyId('e572a5178ff72eed7d1d751a18b4b3419699f370', 'Champions')">ID</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalUpdates" onclick="toggleModal('modalUpdates')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="color: var(--accent-neon); margin-top: 0;">HISTORIAL</h2>
            <div style="border-left: 2px solid var(--accent-neon); padding-left: 15px;">
                <p><b>v4.0:</b> Añadido sistema de reseñas local.</p>
                <p><b>v3.5:</b> Categorización por colores y secciones.</p>
            </div>
            <button onclick="toggleModal('modalUpdates')" class="a-btn a-play" style="width:100%; padding:15px; margin-top:20px">CERRAR</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalReviews" onclick="toggleModal('modalReviews')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="color: var(--fav-gold); margin-top: 0;">RESEÑAS DE LA COMUNIDAD</h2>
            
            <div class="review-form">
                <input type="text" id="revName" class="review-input" placeholder="Tu nombre o nick...">
                <textarea id="revText" class="review-textarea" placeholder="¿Qué te parece el sitio?..."></textarea>
                <button onclick="saveReview()" class="a-btn a-play" style="background: var(--fav-gold); color: #000;">Publicar Reseña</button>
            </div>

            <div class="review-list" id="reviewContainer">
                </div>
            
            <button onclick="toggleModal('modalReviews')" class="a-btn a-copy" style="width:100%; padding:15px; margin-top:20px">VOLVER</button>
        </div>
    </div>

    <div id="toast">Copiado</div>

    <script>
        // Función para abrir/cerrar modales
        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
            if(id === 'modalReviews') displayReviews();
        }

        // Guardar reseña en LocalStorage
        function saveReview() {
            const name = document.getElementById('revName').value;
            const text = document.getElementById('revText').value;

            if(!name || !text) { alert('Rellena ambos campos'); return; }

            const newReview = {
                name: name,
                text: text,
                date: new Date().toLocaleDateString()
            };

            let reviews = JSON.parse(localStorage.getItem('sdj_reviews')) || [];
            reviews.unshift(newReview); // Añadir al principio
            localStorage.setItem('sdj_reviews', JSON.stringify(reviews));

            document.getElementById('revName').value = '';
            document.getElementById('revText').value = '';
            displayReviews();
        }

        // Mostrar reseñas
        function displayReviews() {
            const container = document.getElementById('reviewContainer');
            const reviews = JSON.parse(localStorage.getItem('sdj_reviews')) || [];
            
            container.innerHTML = reviews.map(r => `
                <div class="review-card">
                    <div class="review-header">
                        <span>👤 ${r.name}</span>
                        <span>📅 ${r.date}</span>
                    </div>
                    <div class="review-text">${r.text}</div>
                </div>
            `).join('');

            if(reviews.length === 0) {
                container.innerHTML = '<p style="text-align:center; opacity:0.5;">Aún no hay reseñas. ¡Sé el primero!</p>';
            }
        }

        function copyId(id, name) {
            navigator.clipboard.writeText(id).then(() => {
                const t = document.getElementById("toast");
                t.innerText = "📋 ID de " + name + " copiada";
                t.classList.add("show");
                setTimeout(() => { t.classList.remove("show"); }, 3000);
            });
        }

        function filterChannels() {
            const filter = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const title = card.querySelector('.card-title').innerText.toLowerCase();
                card.style.display = title.includes(filter) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
