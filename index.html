<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDJ | Stream Center Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0c; --bg-stripe: #121216; --card-bg: #1a1a20;
            --accent-neon: #7f5af0; --discord-color: #5865F2; --f1-red: #e10600;
            --dazn-blue: #3498db; --nba-orange: #ff9800; --foot-green: #2ecc71;
            --movistar-blue: #00bcff; --champions-blue: #001e4e;
            --text-main: #ffffff; --transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            --live-red: #ff0000; --online-green: #2ecc71;
        }

        @keyframes stripe-move { 0% { background-position: 0 0; } 100% { background-position: 100px 100px; } }
        body {
            font-family: 'Poppins', sans-serif; background-color: var(--bg-deep); color: var(--text-main);
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: linear-gradient(135deg, var(--bg-stripe) 25%, transparent 25%, transparent 50%, var(--bg-stripe) 50%, var(--bg-stripe) 75%, transparent 75%, transparent);
            background-size: 80px 80px; animation: stripe-move 12s linear infinite;
        }

        header { width: 100%; background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(10px); padding: 20px 0; text-align: center; border-bottom: 2px solid var(--accent-neon); position: sticky; top: 0; z-index: 100; }

        /* SECCIÓN NOTICIAS MEJORADA */
        #news-section {
            width: 90%; max-width: 1100px; margin: 20px 0; display: none; /* Oculto por defecto */
            background: rgba(127, 90, 240, 0.05); border: 2px solid var(--accent-neon);
            border-radius: 24px; overflow: hidden; animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .news-img { width: 350px; height: 200px; object-fit: cover; border-right: 2px solid var(--accent-neon); }
        .news-content { padding: 25px; flex: 1; position: relative; }
        .news-content h2 { margin: 0 0 10px 0; color: var(--accent-neon); font-family: 'Oswald'; text-transform: uppercase; letter-spacing: 1px; }
        .news-timer { position: absolute; top: 10px; right: 20px; font-size: 0.7rem; color: #888; font-weight: 800; }

        .search-box { width: 90%; max-width: 500px; margin: 10px auto; padding: 12px 25px; border-radius: 50px; background: var(--card-bg); border: 2px solid #333; color: white; outline: none; transition: 0.3s; display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; width: 100%; max-width: 1100px; padding: 20px; box-sizing: border-box; }

        .card { background: var(--card-bg); border-radius: 24px; overflow: hidden; border: 1px solid #222; transition: var(--transition); display: flex; flex-direction: column; position: relative; }
        .card.live-now { border-color: var(--live-red); box-shadow: 0 0 15px rgba(255,0,0,0.2); }
        .status-dot { position: absolute; top: 15px; right: 15px; width: 12px; height: 12px; border-radius: 50%; background: var(--online-green); border: 2px solid #000; }
        .status-dot.offline { background: #555; }
        .fav-btn { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); border: none; color: #444; font-size: 1.2rem; cursor: pointer; width: 35px; height: 35px; border-radius: 50%; z-index: 5; }
        .fav-btn.active { color: #ffcc00; }

        .card-img { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 3rem; border-bottom: 1px solid #222; }
        .card-body { padding: 20px; }
        .card-title { font-size: 1.1rem; margin: 0 0 15px 0; }
        .action-box { display: flex; gap: 8px; }
        .a-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .a-play { background: var(--accent-neon); color: white; }

        /* ADMIN */
        #settings-btn { position: fixed; bottom: 20px; right: 20px; background: #333; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; z-index: 1000; opacity: 0.5; }
        #admin-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a20; padding: 25px; border-radius: 20px; border: 2px solid var(--accent-neon); z-index: 2000; width: 350px; max-height: 80vh; overflow-y: auto; }
        .admin-tab { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 8px; cursor: pointer; background: #333; color: white; border: none; border-radius: 5px; font-weight: 600; }
        .tab-btn.active { background: var(--accent-neon); }
        input, textarea { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 10px; margin: 5px 0; border-radius: 8px; box-sizing: border-box; }
        
        #toast { visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 12px 30px; border-radius: 50px; font-weight: 800; z-index: 3000; }
        #toast.show { visibility: visible; }

        @media (max-width: 768px) {
            #news-section { flex-direction: column; }
            .news-img { width: 100%; height: 150px; border-right: none; border-bottom: 2px solid var(--accent-neon); }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <img src="SDJ.jpg" alt="SDJ" style="height: 60px; border-radius: 10px;">
    </header>

    <div id="news-section">
        <img id="news-img-display" src="" class="news-img">
        <div class="news-content">
            <span class="news-timer" id="news-timer-display"></span>
            <h2 id="news-title-display"></h2>
            <p id="news-text-display"></p>
        </div>
    </div>

    <input type="text" id="channelSearch" class="search-box" placeholder="Buscar canal..." onkeyup="filterChannels()">

    <div class="grid" id="main-grid"></div>

    <button id="settings-btn" onclick="loginAdmin()">⚙️</button>

    <div id="admin-panel">
        <div class="admin-tab">
            <button class="tab-btn active" onclick="showTab('channels')">Canales</button>
            <button class="tab-btn" onclick="showTab('news')">Noticias</button>
        </div>

        <div id="tab-channels">
            <div id="admin-list"></div>
        </div>

        <div id="tab-news" style="display:none">
            <label>URL de la Foto:</label>
            <input type="text" id="news-img-url" placeholder="https://ejemplo.com/foto.jpg">
            <label>Título:</label>
            <input type="text" id="news-title-input" placeholder="Ej: Mantenimiento hoy">
            <label>Mensaje:</label>
            <textarea id="news-text-input" rows="3"></textarea>
            <label>Caducidad (minutos):</label>
            <input type="number" id="news-expiry-input" placeholder="60 (1 hora)">
            <button onclick="updateNews()" class="a-play" style="width:100%; margin-top:10px; padding:12px; border-radius:10px">Publicar Noticia</button>
            <button onclick="deleteNews()" style="width:100%; margin-top:8px; padding:8px; background:#e10600; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:800">Borrar Noticia Actual</button>
        </div>

        <button class="a-play" style="width:100%; margin-top:20px; padding:12px; border-radius:10px; background:#444" onclick="closeAdmin()">Cerrar Panel</button>
    </div>

    <div id="toast">Copiado</div>

    <script>
        const userAdmin = "admin";
        const passAdmin = "1234";
        
        const channels = [
            { id: 'f1', name: 'F1 DAZN', tag: 'Motor', icon: '🏎️', color: 'var(--f1-red)', ace: 'd65257bb934b73647374224fd62d836815804be2' },
            { id: 'champions', name: 'Champions League', tag: 'UEFA', icon: '🏆', color: 'var(--champions-blue)', ace: 'e572a5178ff72eed7d1d751a18b4b3419699f370' },
            { id: 'dazn-laliga', name: 'DAZN LaLiga', tag: 'LaLiga', icon: '⚽', color: 'var(--foot-green)', ace: '19f28f60c908f987b1a03da078e63320d7bf29e8' },
            { id: 'movistar-laliga-1', name: 'M+ LaLiga TV', tag: 'M+ LaLiga', icon: '⚽', color: 'var(--movistar-blue)', ace: '31c19ffb3472c289c5bbbbc174449c8ed0d19e38' },
            { id: 'movistar-laliga-2', name: 'M+ LaLiga 2', tag: 'M+ LaLiga', icon: '⚽', color: 'var(--movistar-blue)', ace: 'caa631e8850e3eb5e7c039063dd8a339ccef1176' },
            { id: 'dazn-1', name: 'DAZN 1', tag: 'DAZN', icon: '📺', color: 'var(--dazn-blue)', ace: '4141892f5df7d6474bf0279895ce02b7336c9928' },
            { id: 'dazn-2', name: 'DAZN 2', tag: 'DAZN', icon: '📺', color: 'var(--dazn-blue)', ace: 'b0eabe0fdd02fdd165896236765a9b753a2ff516' },
            { id: 'nba', name: 'NBA TV Pro', tag: 'NBA', icon: '🏀', color: 'var(--nba-orange)', ace: 'e72d03fb9694164317260f684470be9ab781ed95' }
        ];

        function renderGrid() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            channels.forEach(ch => {
                grid.innerHTML += `
                    <div class="card" data-channel="${ch.id}">
                        <button class="fav-btn" onclick="toggleFav('${ch.id}')">★</button>
                        <div class="status-dot" id="dot-${ch.id}"></div>
                        <div class="card-img" style="background: radial-gradient(circle, ${ch.color} 0%, #000 100%);">${ch.icon}</div>
                        <div class="card-body">
                            <span class="card-tag" id="tag-${ch.id}" style="color: ${ch.color}">${ch.tag}</span>
                            <h3 class="card-title">${ch.name}</h3>
                            <div class="action-box">
                                <a href="acestream://${ch.ace}" class="a-btn a-play">Abrir</a>
                                <button class="a-btn a-copy" onclick="copyId('${ch.ace}', '${ch.name}')" style="background:#222; color:white; flex:0.4">ID</button>
                            </div>
                        </div>
                    </div>`;
            });
            loadAll();
        }

        // LOGICA DE NOTICIAS ACTUALIZADA
        function updateNews() {
            const img = document.getElementById('news-img-url').value;
            const title = document.getElementById('news-title-input').value;
            const text = document.getElementById('news-text-input').value;
            const mins = parseInt(document.getElementById('news-expiry-input').value) || 60;

            const expiryTime = Date.now() + (mins * 60000);
            const newsObj = { img, title, text, expiry: expiryTime };
            
            localStorage.setItem('sdj_news', JSON.stringify(newsObj));
            checkNews();
            alert("Noticia publicada por " + mins + " minutos.");
        }

        function deleteNews() {
            localStorage.removeItem('sdj_news');
            checkNews();
        }

        function checkNews() {
            const newsData = JSON.parse(localStorage.getItem('sdj_news'));
            const section = document.getElementById('news-section');

            if (!newsData) {
                section.style.display = 'none';
                return;
            }

            const now = Date.now();
            if (now > newsData.expiry) {
                localStorage.removeItem('sdj_news');
                section.style.display = 'none';
            } else {
                section.style.display = 'flex';
                document.getElementById('news-img-display').src = newsData.img || 'https://via.placeholder.com/350x200';
                document.getElementById('news-title-display').innerText = newsData.title;
                document.getElementById('news-text-display').innerText = newsData.text;
                
                // Mostrar tiempo restante
                const diff = Math.round((newsData.expiry - now) / 60000);
                document.getElementById('news-timer-display').innerText = "CADUCA EN: " + diff + " MIN";
            }
        }

        // Ejecutar chequeo cada 30 segundos
        setInterval(checkNews, 30000);

        // FUNCIONES ADMIN Y ESTADOS
        function showTab(tab) {
            document.getElementById('tab-channels').style.display = tab === 'channels' ? 'block' : 'none';
            document.getElementById('tab-news').style.display = tab === 'news' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(event) event.target.classList.add('active');
        }

        function loginAdmin() {
            if(prompt("Usuario Admin:") === userAdmin && prompt("Password:") === passAdmin) {
                document.getElementById('admin-panel').style.display = 'block';
                renderAdmin();
            }
        }

        function renderAdmin() {
            const list = document.getElementById('admin-list');
            list.innerHTML = '';
            channels.forEach(ch => {
                const isLive = document.querySelector(`.card[data-channel="${ch.id}"]`).classList.contains('live-now');
                const isOff = document.getElementById(`dot-${ch.id}`).classList.contains('offline');
                list.innerHTML += `
                    <div style="padding:10px 0; border-bottom:1px solid #333; font-size:12px">
                        <strong>${ch.name}</strong><br>
                        Live: <input type="checkbox" ${isLive ? 'checked' : ''} onchange="toggleLive('${ch.id}', this.checked, true)">
                        Down: <input type="checkbox" ${isOff ? 'checked' : ''} onchange="toggleStatus('${ch.id}', this.checked)">
                    </div>`;
            });
        }

        function toggleLive(id, status, save) {
            const card = document.querySelector(`.card[data-channel="${id}"]`);
            if(status) card.classList.add('live-now'); else card.classList.remove('live-now');
            if(save) localStorage.setItem(`live_${id}`, status);
        }

        function toggleStatus(id, isOff) {
            const dot = document.getElementById(`dot-${id}`);
            if(isOff) dot.classList.add('offline'); else dot.classList.remove('offline');
            localStorage.setItem(`off_${id}`, isOff);
        }

        function toggleFav(id) {
            const btn = document.querySelector(`.card[data-channel="${id}"] .fav-btn`);
            const active = btn.classList.toggle('active');
            localStorage.setItem(`fav_${id}`, active);
            sortCards();
        }

        function sortCards() {
            const grid = document.getElementById('main-grid');
            const cards = Array.from(grid.children);
            cards.sort((a, b) => (b.querySelector('.fav-btn').classList.contains('active')) - (a.querySelector('.fav-btn').classList.contains('active')));
            cards.forEach(c => grid.appendChild(c));
        }

        function filterChannels() {
            let input = document.getElementById('channelSearch').value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                card.style.display = card.querySelector('.card-title').innerText.toLowerCase().includes(input) ? "flex" : "none";
            });
        }

        function copyId(id, name) {
            navigator.clipboard.writeText(id);
            const t = document.getElementById("toast");
            t.className = "show"; setTimeout(() => t.className = "", 2000);
        }

        function loadAll() {
            channels.forEach(ch => {
                if(localStorage.getItem(`fav_${ch.id}`) === 'true') document.querySelector(`.card[data-channel="${ch.id}"] .fav-btn`).classList.add('active');
                if(localStorage.getItem(`off_${ch.id}`) === 'true') document.getElementById(`dot-${ch.id}`).classList.add('offline');
                if(localStorage.getItem(`live_${ch.id}`) === 'true') toggleLive(ch.id, true, false);
            });
            checkNews();
            sortCards();
        }

        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        
        renderGrid();
    </script>
</body>
</html>
