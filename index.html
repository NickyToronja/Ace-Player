<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDJ | Stream Center Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0c; --bg-stripe: #121216; --card-bg: #1a1a20;
            --accent-neon: #7f5af0; --discord-color: #5865F2; --f1-red: #e10600;
            --dazn-blue: #3498db; --nba-orange: #ff9800; --foot-green: #2ecc71;
            --movistar-blue: #00bcff; --champions-blue: #001e4e;
            --text-main: #ffffff; --transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            --live-red: #ff0000; --online-green: #2ecc71;
        }

        @keyframes stripe-move { 0% { background-position: 0 0; } 100% { background-position: 100px 100px; } }
        @keyframes live-glow {
            0%, 100% { box-shadow: 0 0 10px var(--live-red); border-bottom-color: var(--live-red); }
            50% { box-shadow: 0 0 25px var(--live-red); border-bottom-color: #ff4d4d; }
        }

        body {
            font-family: 'Poppins', sans-serif; background-color: var(--bg-deep); color: var(--text-main);
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: linear-gradient(135deg, var(--bg-stripe) 25%, transparent 25%, transparent 50%, var(--bg-stripe) 50%, var(--bg-stripe) 75%, transparent 75%, transparent);
            background-size: 80px 80px; animation: stripe-move 12s linear infinite;
        }

        header {
            width: 100%; background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(10px);
            padding: 20px 0; text-align: center; border-bottom: 2px solid var(--accent-neon);
            position: sticky; top: 0; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        header.live-active { animation: live-glow 1.5s infinite ease-in-out; }

        .logo-sdj { height: 65px; border-radius: 12px; border: 1px solid var(--accent-neon); }

        .search-box {
            width: 90%; max-width: 500px; margin: 30px auto 10px;
            padding: 12px 25px; border-radius: 50px; background: var(--card-bg);
            border: 2px solid #333; color: white; font-family: 'Poppins'; outline: none;
            transition: 0.3s; display: block;
        }
        .search-box:focus { border-color: var(--accent-neon); box-shadow: 0 0 15px rgba(127, 90, 240, 0.3); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; width: 100%; max-width: 1100px; padding: 20px; box-sizing: border-box; }

        .card { 
            background: var(--card-bg); border-radius: 24px; overflow: hidden; 
            border: 1px solid #222; transition: var(--transition); display: flex; 
            flex-direction: column; position: relative;
        }
        .card.live-now { border-color: var(--live-red); box-shadow: 0 0 15px rgba(255,0,0,0.2); }
        .card:hover { transform: translateY(-10px); border-color: var(--accent-neon); }

        .fav-btn {
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6);
            border: none; color: #444; font-size: 1.2rem; cursor: pointer;
            width: 35px; height: 35px; border-radius: 50%; z-index: 5; transition: 0.3s;
        }
        .fav-btn.active { color: #ffcc00; text-shadow: 0 0 10px #ffcc00; }

        .status-dot {
            position: absolute; top: 15px; right: 15px; width: 12px; height: 12px;
            border-radius: 50%; background: var(--online-green); border: 2px solid #000;
        }
        .status-dot.offline { background: #555; }

        .card-img { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 3rem; border-bottom: 1px solid #222; }
        .card-body { padding: 20px; }
        .card-tag { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .card-title { font-size: 1.1rem; margin: 0 0 15px 0; height: 1.4em; overflow: hidden; }

        .action-box { display: flex; gap: 8px; }
        .a-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; }
        .a-play { background: var(--accent-neon); color: white; }
        .a-copy { background: #222; color: #eee; border: 1px solid #333; }

        /* ADMIN PANEL */
        #settings-btn { position: fixed; bottom: 20px; right: 20px; background: #333; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; z-index: 1000; opacity: 0.5; font-size: 1.2rem; }
        #admin-panel { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #1a1a20; padding: 25px; border-radius: 20px; border: 2px solid var(--accent-neon); 
            z-index: 2000; width: 350px; box-shadow: 0 0 100px rgba(0,0,0,0.9); max-height: 80vh; overflow-y: auto;
        }
        .admin-row { display: flex; flex-direction: column; gap: 5px; padding: 10px 0; border-bottom: 1px solid #333; font-size: 0.8rem; }
        .admin-controls { display: flex; justify-content: space-between; align-items: center; }

        #toast { visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 12px 30px; border-radius: 50px; font-weight: 800; z-index: 3000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #toast.show { visibility: visible; animation: slideIn 0.3s forwards; }
        @keyframes slideIn { from { bottom: -20px; opacity: 0; } to { bottom: 30px; opacity: 1; } }
    </style>
</head>
<body>

    <header id="main-header">
        <img src="SDJ.jpg" alt="SDJ" class="logo-sdj">
    </header>

    <input type="text" id="channelSearch" class="search-box" placeholder="Buscar canal o deporte..." onkeyup="filterChannels()">

    <div class="grid" id="main-grid">
        </div>

    <button id="settings-btn" onclick="loginAdmin()">⚙️</button>

    <div id="admin-panel">
        <h3 style="margin:0 0 15px 0; color:var(--accent-neon)">SDJ Admin Center</h3>
        <div id="admin-list"></div>
        <button class="a-play" style="width:100%; margin-top:15px; padding:12px; border-radius:10px;" onclick="closeAdmin()">Guardar y Aplicar</button>
    </div>

    <div id="toast">Copiado</div>

    <script>
        const userAdmin = "admin";
        const passAdmin = "1234";
        
        // BASE DE DATOS DE CANALES ACTUALIZADA
        const channels = [
            { id: 'f1', name: 'F1 DAZN', tag: 'Motor', icon: '🏎️', color: 'var(--f1-red)', ace: 'd65257bb934b73647374224fd62d836815804be2' },
            { id: 'champions', name: 'Champions League', tag: 'UEFA', icon: '🏆', color: 'var(--champions-blue)', ace: 'e572a5178ff72eed7d1d751a18b4b3419699f370' },
            { id: 'dazn-laliga', name: 'DAZN LaLiga', tag: 'LaLiga', icon: '⚽', color: 'var(--foot-green)', ace: '19f28f60c908f987b1a03da078e63320d7bf29e8' },
            { id: 'movistar-laliga-1', name: 'M+ LaLiga TV', tag: 'M+ LaLiga', icon: '⚽', color: 'var(--movistar-blue)', ace: '31c19ffb3472c289c5bbbbc174449c8ed0d19e38' },
            { id: 'movistar-laliga-2', name: 'M+ LaLiga 2', tag: 'M+ LaLiga', icon: '⚽', color: 'var(--movistar-blue)', ace: 'caa631e8850e3eb5e7c039063dd8a339ccef1176' },
            { id: 'dazn-1', name: 'DAZN 1', tag: 'DAZN', icon: '📺', color: 'var(--dazn-blue)', ace: '4141892f5df7d6474bf0279895ce02b7336c9928' },
            { id: 'dazn-2', name: 'DAZN 2', tag: 'DAZN', icon: '📺', color: 'var(--dazn-blue)', ace: 'b0eabe0fdd02fdd165896236765a9b753a2ff516' },
            { id: 'nba', name: 'NBA TV Pro', tag: 'NBA', icon: '🏀', color: 'var(--nba-orange)', ace: 'e72d03fb9694164317260f684470be9ab781ed95' }
        ];

        // RENDERIZAR TARJETAS
        function renderGrid() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            channels.forEach(ch => {
                grid.innerHTML += `
                    <div class="card" data-channel="${ch.id}">
                        <button class="fav-btn" onclick="toggleFav('${ch.id}')">★</button>
                        <div class="status-dot" id="dot-${ch.id}"></div>
                        <div class="card-img" style="background: radial-gradient(circle, ${ch.color} 0%, #000 100%);">${ch.icon}</div>
                        <div class="card-body">
                            <span class="card-tag" id="tag-${ch.id}" style="color: ${ch.color}">${ch.tag}</span>
                            <h3 class="card-title">${ch.name}</h3>
                            <div class="action-box">
                                <a href="acestream://${ch.ace}" class="a-btn a-play">Abrir</a>
                                <button class="a-btn a-copy" onclick="copyId('${ch.ace}', '${ch.name}')">ID</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            loadStates();
        }

        // CARGAR ESTADOS (FAVS, LIVE, STATUS)
        function loadStates() {
            channels.forEach(ch => {
                // Favoritos
                if(localStorage.getItem(`fav_${ch.id}`) === 'true') {
                    document.querySelector(`.card[data-channel="${ch.id}"] .fav-btn`).classList.add('active');
                }
                // Offline
                if(localStorage.getItem(`off_${ch.id}`) === 'true') {
                    document.getElementById(`dot-${ch.id}`).classList.add('offline');
                }
                // Live
                if(localStorage.getItem(`live_${ch.id}`) === 'true') {
                    toggleLive(ch.id, true, false);
                }
            });
            sortCards();
        }

        function toggleFav(id) {
            const btn = document.querySelector(`.card[data-channel="${id}"] .fav-btn`);
            const active = btn.classList.toggle('active');
            localStorage.setItem(`fav_${id}`, active);
            sortCards();
        }

        function sortCards() {
            const grid = document.getElementById('main-grid');
            const cards = Array.from(grid.children);
            cards.sort((a, b) => {
                const aFav = a.querySelector('.fav-btn').classList.contains('active');
                const bFav = b.querySelector('.fav-btn').classList.contains('active');
                return bFav - aFav;
            });
            cards.forEach(c => grid.appendChild(c));
        }

        function filterChannels() {
            let input = document.getElementById('channelSearch').value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                let title = card.querySelector('.card-title').innerText.toLowerCase();
                let tag = card.querySelector('.card-tag').innerText.toLowerCase();
                card.style.display = (title.includes(input) || tag.includes(input)) ? "flex" : "none";
            });
        }

        // PANEL ADMIN
        function loginAdmin() {
            if(prompt("Usuario Admin:") === userAdmin && prompt("Password:") === passAdmin) {
                document.getElementById('admin-panel').style.display = 'block';
                renderAdmin();
            } else { alert("Error de acceso"); }
        }

        function renderAdmin() {
            const list = document.getElementById('admin-list');
            list.innerHTML = '';
            channels.forEach(ch => {
                const isLive = document.querySelector(`.card[data-channel="${ch.id}"]`).classList.contains('live-now');
                const isOff = document.getElementById(`dot-${ch.id}`).classList.contains('offline');
                list.innerHTML += `
                    <div class="admin-row">
                        <strong style="color:var(--accent-neon)">${ch.name}</strong>
                        <div class="admin-controls">
                            <label><input type="checkbox" ${isLive ? 'checked' : ''} onchange="toggleLive('${ch.id}', this.checked, true)"> EN VIVO</label>
                            <label><input type="checkbox" ${isOff ? 'checked' : ''} onchange="toggleStatus('${ch.id}', this.checked)"> CAÍDO</label>
                        </div>
                    </div>`;
            });
        }

        function toggleLive(id, status, save) {
            const card = document.querySelector(`.card[data-channel="${id}"]`);
            const tag = document.getElementById(`tag-${id}`);
            if(status) {
                card.classList.add('live-now');
                if(!tag.innerText.includes("● LIVE")) tag.innerText = "● LIVE - " + tag.innerText;
                tag.style.color = "var(--live-red)";
            } else {
                card.classList.remove('live-now');
                tag.innerText = tag.innerText.replace("● LIVE - ", "");
                // Restaurar color original del canal
                const chData = channels.find(c => c.id === id);
                tag.style.color = chData ? chData.color : "";
            }
            if(save) localStorage.setItem(`live_${id}`, status);
            updateHeader();
        }

        function toggleStatus(id, isOffline) {
            const dot = document.getElementById(`dot-${id}`);
            isOffline ? dot.classList.add('offline') : dot.classList.remove('offline');
            localStorage.setItem(`off_${id}`, isOffline);
        }

        function updateHeader() {
            document.getElementById('main-header').classList.toggle('live-active', !!document.querySelector('.card.live-now'));
        }

        function copyId(id, name) {
            navigator.clipboard.writeText(id);
            const t = document.getElementById("toast");
            t.innerText = "📋 " + name + " copiada";
            t.className = "show";
            setTimeout(() => t.className = "", 2000);
        }

        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        // Inicialización
        renderGrid();
    </script>
</body>
</html>
