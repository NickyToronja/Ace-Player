<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDJ | Stream Center Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0c;
            --bg-stripe: #121216;
            --card-bg: #1a1a20;
            --accent-neon: #7f5af0; 
            --discord-color: #5865F2;
            --f1-red: #e10600;
            --text-main: #ffffff;
            --transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* FONDO ANIMADO DIAGONAL */
        @keyframes stripe-move { 0% { background-position: 0 0; } 100% { background-position: 100px 100px; } }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            background-image: linear-gradient(135deg, var(--bg-stripe) 25%, transparent 25%, transparent 50%, var(--bg-stripe) 50%, var(--bg-stripe) 75%, transparent 75%, transparent);
            background-size: 80px 80px;
            animation: stripe-move 12s linear infinite;
        }

        /* HEADER CON LOGO SDJ */
        header {
            width: 100%;
            background: rgba(10, 10, 12, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            text-align: center;
            border-bottom: 2px solid var(--accent-neon);
            position: sticky; top: 0; z-index: 100;
        }

        .logo-sdj {
            height: 60px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(127, 90, 240, 0.5);
        }

        .hero { width: 100%; max-width: 1000px; padding: 40px 20px; text-align: center; }

        /* BOTONES DE ACCIÓN */
        .btn-group { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 50px; }

        .btn {
            padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: 800;
            text-transform: uppercase; font-size: 0.9rem; transition: var(--transition);
            display: flex; align-items: center; gap: 10px;
        }

        .btn-discord { background: var(--discord-color); color: white; box-shadow: 0 5px 15px rgba(88, 101, 242, 0.3); }
        .btn-discord:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(88, 101, 242, 0.5); }

        .btn-download { background: var(--f1-red); color: white; box-shadow: 0 5px 15px rgba(225, 6, 0, 0.3); }
        .btn-download:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(225, 6, 0, 0.5); }

        /* GRID DE CANALES */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }

        .card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            border: 1px solid #222; transition: var(--transition); cursor: pointer;
        }

        .card:hover { border-color: var(--accent-neon); transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }

        .card-img {
            height: 180px; background: #111; display: flex; align-items: center; justify-content: center;
            font-size: 4rem; position: relative;
        }

        .card-img::after { content: ''; position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, rgba(127,90,240,0.2) 0%, transparent 70%); }

        .card-body { padding: 25px; text-align: left; }
        .card-tag { color: var(--accent-neon); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .card-title { font-size: 1.3rem; font-weight: 700; margin: 0; }
        .card-hint { color: #666; font-size: 0.8rem; margin-top: 10px; }

        /* NOTIFICACIÓN */
        #toast {
            visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #222; color: white; padding: 15px 30px; border-radius: 10px;
            border-bottom: 3px solid var(--accent-neon); font-weight: 600; z-index: 1000;
        }
        #toast.show { visibility: visible; animation: pop 0.4s ease-out; }
        @keyframes pop { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <img src="https://raw.githubusercontent.com/TU_USUARIO/TU_REPO/main/SDJ.jpg" alt="SDJ Logo" class="logo-sdj">
    </header>

    <div class="hero">
        <h1 style="font-family: 'Oswald'; font-size: 3rem; margin-bottom: 10px;">CENTRO DE MANDO SDJ</h1>
        <p style="color: #888; margin-bottom: 35px;">Descarga Ace Stream y únete a nuestra comunidad.</p>

        <div class="btn-group">
            <a href="https://discord.com/invite/zCS9ZBUXAt" target="_blank" class="btn btn-discord">
                Únete al Discord 💬
            </a>
            <a href="https://www.mediafire.com/file/s0kkul8d9cbpkty/Ace_Stream_Media_3.2.8.exe/file" target="_blank" class="btn btn-download">
                Descargar Ace Player 📦
            </a>
        </div>

        <div class="grid">
            <div class="card" onclick="copyId('d65257bb934b73647374224fd62d836815804be2', 'F1')">
                <div class="card-img">🏎️</div>
                <div class="card-body">
                    <span class="card-tag">Transmisión</span>
                    <h3 class="card-title">Fórmula 1 - DAZN</h3>
                    <p class="card-hint">Haz clic para copiar ID</p>
                </div>
            </div>

            <div class="card" onclick="copyId('31c19ffb3472c289c5bbbbc174449c8ed0d19e38', 'Fútbol')">
                <div class="card-img">⚽</div>
                <div class="card-body">
                    <span class="card-tag">Transmisión</span>
                    <h3 class="card-title">Fútbol Premium</h3>
                    <p class="card-hint">Haz clic para copiar ID</p>
                </div>
            </div>
        </div>
    </div>

    <div id="toast">ID Copiada: ¡A disfrutar!</div>

    <script>
        function copyId(id, name) {
            navigator.clipboard.writeText(id);
            var t = document.getElementById("toast");
            t.innerText = "⚡ ID de " + name + " copiada";
            t.className = "show";
            setTimeout(function(){ t.className = ""; }, 3000);
        }
    </script>
</body>
</html>
