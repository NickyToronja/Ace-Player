<head>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0c; --bg-stripe: #121216; --card-bg: #1a1a20;
            --accent-neon: #7f5af0; --discord-color: #5865F2; --f1-red: #e10600;
            --dazn-blue: #3498db; --nba-orange: #ff9800; --foot-green: #2ecc71;
            --movistar-blue: #00bcff; --champions-blue: #001e4e;
            --text-main: #ffffff; --transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        @keyframes stripe-move { 0% { background-position: 0 0; } 100% { background-position: 100px 100px; } }

        body {
            font-family: 'Poppins', sans-serif; background-color: var(--bg-deep); color: var(--text-main);
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: linear-gradient(135deg, var(--bg-stripe) 25%, transparent 25%, transparent 50%, var(--bg-stripe) 50%, var(--bg-stripe) 75%, transparent 75%, transparent);
            background-size: 80px 80px; animation: stripe-move 12s linear infinite;
        }

        header {
            width: 100%; background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(10px);
            padding: 20px 0; text-align: center; border-bottom: 2px solid var(--accent-neon);
            position: sticky; top: 0; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo-sdj { height: 65px; border-radius: 12px; border: 1px solid var(--accent-neon); box-shadow: 0 0 20px rgba(127, 90, 240, 0.4); }

        .hero { width: 100%; max-width: 1100px; padding: 40px 20px; text-align: center; box-sizing: border-box; }
        
        h1 { font-family: 'Oswald'; font-size: 3.5rem; margin: 0; letter-spacing: 2px; text-shadow: 0 0 20px rgba(127, 90, 240, 0.6); }

        /* REPRODUCTOR WEB */
        #player-section {
            display: none; width: 100%; max-width: 900px; margin: 20px auto; 
            background: #000; border-radius: 20px; border: 2px solid var(--accent-neon);
            overflow: hidden; box-shadow: 0 0 40px rgba(127, 90, 240, 0.4);
        }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .player-controls { background: #1a1a20; padding: 15px; display: flex; justify-content: space-between; align-items: center; }

        .btn-group { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin: 40px 0; }
        .btn-main { padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: 800; text-transform: uppercase; font-size: 0.9rem; transition: var(--transition); display: flex; align-items: center; gap: 10px; color: white; cursor: pointer; border: none; }
        .btn-discord { background: var(--discord-color); }
        .btn-download { background: #333; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; width: 100%; }
        .card { background: var(--card-bg); border-radius: 24px; overflow: hidden; border: 1px solid #222; transition: var(--transition); display: flex; flex-direction: column; }
        .card:hover { border-color: var(--accent-neon); transform: translateY(-10px); }
        .card-img { height: 120px; background: #111; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .card-body { padding: 20px; }
        .card-tag { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .card-title { font-size: 1.2rem; margin: 0 0 15px 0; }

        .action-box { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .a-btn { padding: 10px; border-radius: 10px; border: none; cursor: pointer; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; transition: 0.2s; text-decoration: none; text-align: center; }
        .a-web { background: var(--accent-neon); color: white; }
        .a-ace { background: transparent; color: #aaa; border: 1px solid #444; }
        .a-btn:hover { transform: scale(1.03); opacity: 0.9; }

        #toast { visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 12px 30px; border-radius: 50px; font-weight: 800; z-index: 1000; }
        #toast.show { visibility: visible; animation: slideIn 0.3s; }
        @keyframes slideIn { from { bottom: -50px; } to { bottom: 30px; } }
    </style>
</head>
<body>

    <div id="toast">Copiado con éxito</div>

    <script>
        function openWeb(url, name) {
            const player = document.getElementById('player-section');
            const iframe = document.getElementById('main-iframe');
            const title = document.getElementById('now-playing');
            
            player.style.display = 'block';
            iframe.src = url;
            title.innerText = "📺 VIENDO: " + name;
            
            window.scrollTo({top: 100, behavior: 'smooth'});
        }

        function closePlayer() {
            const player = document.getElementById('player-section');
            const iframe = document.getElementById('main-iframe');
            player.style.display = 'none';
            iframe.src = "";
        }

        function copyId(id, name) {
            navigator.clipboard.writeText(id);
            const t = document.getElementById("toast");
            t.innerText = "📋 ID de " + name + " copiada";
            t.className = "show";
            setTimeout(() => { t.className = ""; }, 3000);
        }
    </script>
