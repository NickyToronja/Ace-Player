<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDJ | Stream Center Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0c; --bg-stripe: #121216; --card-bg: #1a1a20;
            --accent-neon: #7f5af0; --discord-color: #5865F2; --f1-red: #e10600;
            --dazn-blue: #3498db; --nba-orange: #ff9800; --foot-green: #2ecc71;
            --text-main: #ffffff; --transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        @keyframes stripe-move { 0% { background-position: 0 0; } 100% { background-position: 100px 100px; } }
        body {
            font-family: 'Poppins', sans-serif; background-color: var(--bg-deep); color: var(--text-main);
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            background-image: linear-gradient(135deg, var(--bg-stripe) 25%, transparent 25%, transparent 50%, var(--bg-stripe) 50%, var(--bg-stripe) 75%, transparent 75%, transparent);
            background-size: 80px 80px; animation: stripe-move 12s linear infinite;
        }
        header { width: 100%; background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(10px); padding: 15px 0; text-align: center; border-bottom: 2px solid var(--accent-neon); position: sticky; top: 0; z-index: 100; }
        .logo-sdj { height: 60px; border-radius: 10px; box-shadow: 0 0 15px rgba(127, 90, 240, 0.5); }
        .hero { width: 100%; max-width: 1000px; padding: 40px 20px; text-align: center; }
        .btn-group { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 50px; }
        .btn { padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: 800; text-transform: uppercase; font-size: 0.9rem; transition: var(--transition); display: flex; align-items: center; gap: 10px; color: white; }
        .btn-discord { background: var(--discord-color); }
        .btn-download { background: var(--f1-red); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid #222; transition: var(--transition); cursor: pointer; }
        .card:hover { border-color: var(--accent-neon); transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .card-img { height: 140px; background: #111; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; position: relative; }
        .card-body { padding: 20px; text-align: left; }
        .card-tag { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .card-title { font-size: 1.2rem; font-weight: 700; margin: 0; }
        #toast { visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #222; color: white; padding: 15px 30px; border-radius: 10px; border-bottom: 3px solid var(--accent-neon); font-weight: 600; z-index: 1000; }
        #toast.show { visibility: visible; animation: pop 0.4s ease-out; }
    </style>
</head>
<body>
    <header><img src="SDJ.jpg" alt="SDJ Logo" class="logo-sdj"></header>
    <div class="hero">
        <h1 style="font-family: 'Oswald'; font-size: 3rem; margin-bottom: 10px;">CENTRO DE MANDO SDJ</h1>
        <div class="btn-group">
            <a href="https://discord.com/invite/zCS9ZBUXAt" target="_blank" class="btn btn-discord">Discord 💬</a>
            <a href="https://www.mediafire.com/file/s0kkul8d9cbpkty/Ace_Stream_Media_3.2.8.exe/file" target="_blank" class="btn btn-download">Descargar Ace Player 📦</a>
        </div>
        <div class="grid">
            <div class="card" onclick="copyId('d65257bb934b73647374224fd62d836815804be2', 'F1')">
                <div class="card-img">🏎️</div>
                <div class="card-body"><span class="card-tag" style="color: var(--f1-red);">Motor</span><h3 class="card-title">Fórmula 1 - DAZN</h3></div>
            </div>
            <div class="card" onclick="copyId('4141892f5df7d6474bf0279895ce02b7336c9928', 'DAZN 1')">
                <div class="card-img">📺</div>
                <div class="card-body"><span class="card-tag" style="color: var(--dazn-blue);">Multideporte</span><h3 class="card-title">DAZN 1</h3></div>
            </div>
            <div class="card" onclick="copyId('b0eabe0fdd02fdd165896236765a9b753a2ff516', 'DAZN 2')">
                <div class="card-img">📺</div>
                <div class="card-body"><span class="card-tag" style="color: var(--dazn-blue);">Multideporte</span><h3 class="card-title">DAZN 2</h3></div>
            </div>
            <div class="card" onclick="copyId('e72d03fb9694164317260f684470be9ab781ed95', 'NBA TV')">
                <div class="card-img">🏀</div>
                <div class="card-body"><span class="card-tag" style="color: var(--nba-orange);">NBA</span><h3 class="card-title">NBA TV</h3></div>
            </div>
            <div class="card" onclick="copyId('31c19ffb3472c289c5bbbbc174449c8ed0d19e38', 'Fútbol')">
                <div class="card-img">⚽</div>
                <div class="card-body"><span class="card-tag" style="color: var(--foot-green);">Fútbol</span><h3 class="card-title">Fútbol Premium</h3></div>
            </div>
        </div>
    </div>
    <div id="toast">ID Copiada</div>
    <script>
        function copyId(id, name) {
            navigator.clipboard.writeText(id);
            var t = document.getElementById("toast");
            t.innerText = "⚡ ID de " + name + " copiada";
            t.className = "show";
            setTimeout(function(){ t.className = ""; }, 3000);
        }
    </script>
</body>
</html>
